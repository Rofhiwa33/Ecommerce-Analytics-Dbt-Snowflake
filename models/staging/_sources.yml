version: 2

sources:
  - name: raw
    description: "Raw landing zone for e-commerce data, ingested directly from source systems."
    database: ecommerce
    schema: raw
    tables:
      - name: raw_customers
        description: "Raw customer records as ingested from the source system."
        columns:
          - name: customer_id
            description: "Source primary key for the customer."
            tests:
              - unique
              - not_null

      - name: raw_orders
        description: "Raw order transactions as ingested from the source system."
        columns:
          - name: order_id
            description: "Source primary key for the order."
            tests:
              - unique
              - not_null

      - name: raw_products
        description: "Raw product catalogue as ingested from the source system."
        columns:
          - name: product_id
            description: "Source primary key for the product."
            tests:
              - unique
              - not_null